name: Remote Asset Upload
on:
  repository_dispatch:
    types: [upload_to_release]

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Decode and Upload File
        shell: bash
        run: |
          # 1. Convert the base64 string back into a real file
          echo "${{ github.event.client_payload.file_content }}" | base64 -d > "${{ github.event.client_payload.file_name }}"
          
          # 2. Upload to the specific Release ID
          gh release upload ${{ github.event.client_payload.release_id }} "${{ github.event.client_payload.file_name }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
