<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVault Admin | Control Center</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/pratyushqwerty7/myStudyMaterial/main/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg: #f8fafc; --side: #ffffff; --accent: #3b82f6; --text: #0f172a; --dim: #64748b; 
            --border: rgba(0,0,0,0.06); --side-w: 75px; --side-open: 260px;
            --shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --success: #10b981; --danger: #ef4444;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #020617; --side: #0f172a; --text: #f8fafc; --dim: #94a3b8; --border: rgba(255,255,255,0.08); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* --- MODALS --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); z-index: 9999; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.3s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-card { background: var(--side); padding: 30px; border-radius: 32px; width: 94%; max-height: 90vh; border: 1px solid var(--border); box-shadow: var(--shadow); position: relative; display: flex; flex-direction: column; overflow-y: auto; }
        .modal-small { max-width: 500px; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; color: var(--dim); cursor: pointer; transition: 0.2s; z-index: 10; }

        /* --- SIDEBAR --- */
        nav { position: fixed; left: 0; top: 0; width: var(--side-w); height: 100vh; background: var(--side); border-right: 1px solid var(--border); transition: var(--transition); z-index: 2000; display: flex; flex-direction: column; }
        nav.expanded { width: var(--side-open); }
        .nav-btn { width: 44px; height: 44px; background: var(--accent); border-radius: 12px; margin: 20px auto; display: flex; align-items: center; justify-content: center; color: white; border: none; cursor: pointer; flex-shrink: 0; }
        .nav-item { height: 50px; border-radius: 12px; margin: 8px 10px; display: flex; align-items: center; padding: 0 15px; color: var(--dim); transition: 0.3s; cursor: pointer; white-space: nowrap; }
        .nav-item i { min-width: 45px; text-align: center; font-size: 1.2rem; margin-left: -10px; }
        
        /* RESTORED WHITE COLOR FOR ACTIVE ICONS */
        .nav-item.active { background: var(--accent) !important; color: white !important; }
        .nav-item.active i { color: white !important; }
        
        .nav-item span { opacity: 0; font-weight: 700; margin-left: 15px; }
        nav.expanded .nav-item span { opacity: 1; }

        /* --- PROGRESS OVERLAY --- */
        .prog-container { width: 100%; height: 14px; background: var(--bg); border-radius: 20px; margin: 25px 0; overflow: hidden; border: 1px solid var(--border); }
        .prog-bar { height: 100%; width: 0%; background: var(--accent); transition: 0.4s ease; border-radius: 20px; box-shadow: 0 0 15px var(--accent); }

        /* --- DASHBOARD UI --- */
        main { flex: 1; margin-left: var(--side-w); padding: 40px 6%; }
        .release-card { background: var(--side); padding: 20px; border-radius: 24px; border: 1px solid var(--border); display: flex; align-items: center; margin-bottom: 15px; transition: 0.3s; cursor: pointer; }
        .release-card:hover { border-color: var(--accent); transform: translateX(5px); }
        .release-info { flex: 1; margin-left: 20px; }
        .mini-btn { width: 40px; height: 40px; border-radius: 12px; border: none; cursor: pointer; transition: 0.2s; margin-left: 10px; display: flex; align-items: center; justify-content: center; }

        .btn { padding: 15px; background: var(--accent); color: white; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .fab { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; border-radius: 50%; background: var(--accent); color: white; border: none; font-size: 1.6rem; cursor: pointer; box-shadow: 0 10px 25px rgba(59,130,246,0.4); z-index: 100; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 14px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
        
        .tag-slider { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .tag-chip { padding: 10px 20px; border-radius: 12px; background: var(--bg); border: 1px solid var(--border); cursor: pointer; white-space: nowrap; font-weight: 700; font-size: 0.85rem; color: var(--dim); }
        .tag-chip.selected { background: var(--accent); color: white; }

        .file-row { display: flex; align-items: center; padding: 15px; background: var(--bg); border-radius: 16px; margin-bottom: 10px; border: 1px solid var(--border); }
        .file-name { flex: 1; font-weight: 600; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

    <div id="auth-gate" class="modal-overlay active">
        <div class="modal-card modal-small" style="text-align: center;">
            <i class="fab fa-github" style="font-size: 3rem; color: var(--accent);"></i>
            <h2 style="margin: 15px 0;">Vault Control</h2>
            <input type="password" id="tk" placeholder="GitHub Token">
            <button class="btn" onclick="verify()">SYNC VAULT</button>
        </div>
    </div>

    <div id="progress-overlay" class="modal-overlay">
        <div class="modal-card modal-small" style="text-align: center;">
            <h2 id="status-head">Connecting...</h2>
            <div class="prog-container"><div class="prog-bar" id="global-bar"></div></div>
            <p id="status-msg" style="font-weight: 800; color: var(--accent);"></p>
        </div>
    </div>

    <div id="push-modal" class="modal-overlay">
        <div class="modal-card modal-small">
            <i class="fas fa-times close-btn" onclick="closeModals()"></i>
            <h3>Configure Release</h3>
            <input type="text" id="p-title" placeholder="Folder Name">
            
            <p style="font-size: 0.7rem; font-weight: 800; color: var(--dim); margin-top: 10px;">CATEGORY</p>
            <div class="tag-slider">
                <div class="tag-chip selected" onclick="selectTag(this, 'class10')">Class 10</div>
                <div class="tag-chip" onclick="selectTag(this, 'class11')">Class 11</div>
                <div class="tag-chip" onclick="selectTag(this, 'class12')">Class 12</div>
                <div class="tag-chip" onclick="selectTag(this, 'jee11')">JEE 11th</div>
                <div class="tag-chip" onclick="selectTag(this, 'jee12')">JEE 12th</div>
                <div class="tag-chip" onclick="selectTag(this, 'extra')">Extras</div>
            </div>

            <p style="font-size: 0.7rem; font-weight: 800; color: var(--dim); margin-top: 15px;">SELECT FILE</p>
            <input type="file" id="p-file">
            
            <button class="btn" style="margin-top: 20px;" onclick="closeModals()">READY TO SET</button>
        </div>
    </div>

    <div id="file-modal" class="modal-overlay">
        <div class="modal-card" style="max-width: 800px; height: 85vh;">
            <i class="fas fa-times close-btn" onclick="closeModals()"></i>
            <h2 id="view-folder-name">Vault Files</h2>
            <div id="file-list-container" style="flex:1; overflow-y:auto; margin-top: 20px;"></div>
        </div>
    </div>

    <nav id="sidebar">
        <button class="nav-btn" onclick="toggleSide()"><i class="fas fa-bars"></i></button>
        <div style="flex: 1; overflow-y: auto;">
            <li class="nav-item active" onclick="setFilter('all', this)"><i class="fas fa-th-list" style="color:#ff3e3e"></i> <span>All Vaults</span></li>
            <li class="nav-item" onclick="setFilter('class10', this)"><i class="fas fa-graduation-cap" style="color:#3b82f6"></i> <span>Class 10</span></li>
            <li class="nav-item" onclick="setFilter('class11', this)"><i class="fas fa-book-open" style="color:#10b981"></i> <span>Class 11</span></li>
            <li class="nav-item" onclick="setFilter('class12', this)"><i class="fas fa-university" style="color:#f59e0b"></i> <span>Class 12</span></li>
            <li class="nav-item" onclick="setFilter('jee11', this)"><i class="fas fa-atom" style="color:#ef4444"></i> <span>JEE 11th</span></li>
            <li class="nav-item" onclick="setFilter('jee12', this)"><i class="fas fa-rocket" style="color:#8b5cf6"></i> <span>JEE 12th</span></li>
            <li class="nav-item" onclick="setFilter('extra', this)"><i class="fas fa-star" style="color:#ec4899"></i> <span>Extras</span></li>
            <li class="nav-item" onclick="window.location.href='index.html'" style="margin-top: 20px;"><i class="fas fa-home"></i> <span>Library</span></li>
            <li class="nav-item" onclick="logout()" style="color:var(--danger)"><i class="fas fa-power-off"></i> <span>Logout</span></li>
        </div>
    </nav>

    <main>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 30px; gap: 15px;">
            <h1 style="font-weight: 800; flex: 1;">Vault Manager</h1>
            <button class="btn" style="width:auto; padding:10px 25px;" onclick="handleSet()">
                <i class="fas fa-check-circle"></i> CONFIRM & PUSH
            </button>
            <button class="btn btn-outline" style="width:auto; padding:10px 20px" onclick="sync()">
                <i class="fas fa-sync"></i> SYNC
            </button>
        </div>
        <div id="main-list"></div>
    </main>

    <button class="fab" onclick="openPush()"><i class="fas fa-plus"></i></button>

    <script>
        const OWNER = 'pratyushqwerty7', REPO = 'myStudyMaterial';
        let releases = [], filter = 'all', selectedTag = 'class10', currentEditId = null;

        window.onload = () => { if(localStorage.getItem('vault_tk')) unlock(); };

        async function verify() {
            const t = document.getElementById('tk').value;
            try {
                const r = await fetch('https://api.github.com/user', { headers: {'Authorization': `token ${t}`} });
                if(r.ok) { localStorage.setItem('vault_tk', t); unlock(); } else alert("Bad Token!");
            } catch(e) { alert("CORS or Network Error"); }
        }

        function unlock() { document.getElementById('auth-gate').classList.remove('active'); sync(); }

        async function sync() {
            const tk = localStorage.getItem('vault_tk');
            try {
                const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/releases`, {
                    headers: {'Authorization': `token ${tk}`}
                });
                releases = await r.json();
                render();
            } catch(e) { console.error("Sync Error"); }
        }

        function render() {
            const container = document.getElementById('main-list');
            container.innerHTML = '';
            const filtered = releases.filter(r => filter === 'all' ? true : r.tag_name.includes(filter));
            filtered.forEach(r => {
                const card = document.createElement('div');
                card.className = 'release-card';
                card.onclick = () => openFileManager(r.id);
                card.innerHTML = `
                    <i class="fas fa-folder" style="font-size:2rem; color:var(--accent)"></i>
                    <div class="release-info">
                        <h3>${r.name}</h3>
                        <p style="font-size:0.75rem; color:var(--dim); font-weight:700;">${r.assets.length} Files • ${r.tag_name}</p>
                    </div>
                    <div style="display:flex;" onclick="event.stopPropagation()">
                        <button class="mini-btn" style="background:rgba(59,130,246,0.1); color:var(--accent)" onclick="openEdit('${r.id}')"><i class="fas fa-edit"></i></button>
                        <button class="mini-btn" style="background:rgba(239,68,68,0.1); color:var(--danger)" onclick="deleteRel('${r.id}')"><i class="fas fa-trash"></i></button>
                    </div>`;
                container.appendChild(card);
            });
        }

        // --- NEW UPLOADER WITH CORS FIX ---
        async function handleSet() {
            const fileInput = document.getElementById('p-file');
            const file = fileInput.files[0];
            const title = document.getElementById('p-title').value;
            const tk = localStorage.getItem('vault_tk');
            if(!title) return alert("Configure vault details first!");

            const overlay = document.getElementById('progress-overlay');
            const bar = document.getElementById('global-bar');
            const msg = document.getElementById('status-msg');
            
            overlay.classList.add('active');
            bar.style.background = "var(--accent)";

            try {
                bar.style.width = '30%'; msg.innerText = "Step 1: Setting up folder...";
                
                const method = currentEditId ? 'PATCH' : 'POST';
                const endpoint = currentEditId ? `releases/${currentEditId}` : 'releases';
                const body = { name: title, tag_name: selectedTag + "-" + Date.now() };

                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/${endpoint}`, {
                    method: method,
                    headers: { 'Authorization': `token ${tk}`, 'Accept': 'application/vnd.github+json' },
                    body: JSON.stringify(body)
                });
                
                if(!res.ok) throw new Error("Step 1 Failed: Token or Repo mismatch.");
                const data = await res.json();
                const uploadUrl = data.upload_url.split('{')[0]; 

                if(file) {
                    bar.style.width = '60%'; msg.innerText = `Step 2: Uploading ${file.name}...`;
                    
                    const upRes = await fetch(`${uploadUrl}?name=${encodeURIComponent(file.name)}`, { 
                        method: 'POST', 
                        mode: 'cors',
                        headers: { 
                            'Authorization': `token ${tk}`,
                            'Content-Type': file.type || 'application/octet-stream'
                        }, 
                        body: file 
                    });

                    if(!upRes.ok) {
                        const errData = await upRes.json();
                        throw new Error(`Upload Failed: ${errData.message || 'CORS/Token'}`);
                    }
                }

                bar.style.width = '100%'; msg.innerText = "Vault Successfully Synced!";
                fileInput.value = ""; 
                setTimeout(() => { overlay.classList.remove('active'); sync(); }, 1500);

            } catch (e) {
                msg.innerText = e.message;
                bar.style.background = "var(--danger)";
                setTimeout(() => overlay.classList.remove('active'), 5000);
            }
        }

        function openEdit(id) { currentEditId = id; const rel = releases.find(r => r.id == id); document.getElementById('p-title').value = rel.name; document.getElementById('push-modal').classList.add('active'); }
        function openPush() { currentEditId = null; document.getElementById('p-title').value = ''; document.getElementById('push-modal').classList.add('active'); }
        
        function openFileManager(id) {
            const rel = releases.find(r => r.id == id);
            document.getElementById('view-folder-name').innerText = rel.name;
            const container = document.getElementById('file-list-container');
            container.innerHTML = '';
            rel.assets.forEach(a => {
                container.innerHTML += `<div class="file-row"><div class="file-name">${a.name}</div><button class="mini-btn" onclick="deleteAsset('${a.id}','${id}')"><i class="fas fa-times"></i></button></div>`;
            });
            document.getElementById('file-modal').classList.add('active');
        }

        async function deleteRel(id) {
            if(!confirm("Delete this vault?")) return;
            await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/releases/${id}`, {
                method: 'DELETE', headers: { 'Authorization': `token ${localStorage.getItem('vault_tk')}` }
            }); sync();
        }

        async function deleteAsset(aid, rid) {
            await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/releases/assets/${aid}`, {
                method: 'DELETE', headers: { 'Authorization': `token ${localStorage.getItem('vault_tk')}` }
            }); sync(); openFileManager(rid);
        }

        function selectTag(el, tag) { document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('selected')); el.classList.add('selected'); selectedTag = tag; }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => { if(m.id !== 'auth-gate') m.classList.remove('active'); }); }
        function toggleSide() { document.getElementById('sidebar').classList.toggle('expanded'); }
        function setFilter(t, el) { filter = t; document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); render(); }
        function logout() { localStorage.removeItem('vault_tk'); location.reload(); }
    </script>
</body>
</html>
