<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Admin | Pro Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar-w: 260px; --vault-blue: #2563eb; }
        
        body { background-color: #fcfdfe; color: #0f172a; transition: all 0.3s ease; }
        @media (prefers-color-scheme: dark) {
            body { background-color: #020617; color: #f8fafc; }
            .bg-white { background-color: #0f172a !important; border-color: #1e293b !important; }
            .bg-slate-50 { background-color: #1e293b !important; }
            .text-slate-800 { color: #f1f5f9 !important; }
            .border-slate-100 { border-color: #1e293b !important; }
            input { background-color: #1e293b !important; color: white !important; }
        }

        .sidebar-item.active { background-color: var(--vault-blue) !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        .tag-pill { cursor: pointer; transition: 0.2s; border: 1px solid #e2e8f0; }
        .tag-pill.selected { background: var(--vault-blue); color: white; border-color: var(--vault-blue); }

        /* Progress Slider Styles */
        .progress-container { height: 6px; background: #e2e8f0; border-radius: 10px; overflow: hidden; display: none; margin-top: 10px; }
        .progress-bar { height: 100%; background: var(--vault-blue); width: 0%; transition: width 0.3s ease; }
        @media (prefers-color-scheme: dark) { .progress-container { background: #1e293b; } }

        .save-btn { opacity: 0; transform: scale(0.8); pointer-events: none; transition: 0.3s; }
        .save-btn.visible { opacity: 1; transform: scale(1); pointer-events: auto; }

        #sidebar { width: var(--sidebar-w); z-index: 100; position: fixed; height: 100vh; }
        #main-content { margin-left: var(--sidebar-w); width: calc(100% - var(--sidebar-w)); }

        @media (max-width: 1024px) {
            #sidebar { transform: translateX(-100%); transition: 0.3s; }
            #sidebar.mobile-open { transform: translateX(0); }
            #main-content { margin-left: 0; width: 100%; }
        }
    </style>
</head>
<body class="flex">

    <div id="overlay" class="fixed inset-0 bg-black/50 z-[90] opacity-0 pointer-events-none transition-opacity" onclick="toggleMobileMenu()"></div>

    <aside id="sidebar" class="bg-white border-r border-slate-100 flex flex-col">
        <div class="p-8 border-b border-slate-50">
            <h1 class="font-black text-blue-600 text-2xl tracking-tighter">STUDY VAULT</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Admin Console</p>
        </div>
        
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <button onclick="setFilter('all', this)" class="sidebar-item active w-full flex items-center gap-4 px-4 py-4 rounded-2xl text-sm font-bold transition-all">
                <i class="fas fa-layer-group text-blue-500 w-5"></i> <span>All Vaults</span>
            </button>
            <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest px-4 pt-8 pb-2">Academic</p>
            <button onclick="setFilter('class10', this)" class="sidebar-item w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-sm font-bold text-slate-500 hover:bg-slate-50 transition-all"><i class="fas fa-graduation-cap text-blue-400 w-5"></i> <span>Class 10</span></button>
            <button onclick="setFilter('class11', this)" class="sidebar-item w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-sm font-bold text-slate-500 hover:bg-slate-50 transition-all"><i class="fas fa-book-open text-emerald-500 w-5"></i> <span>Class 11</span></button>
            <button onclick="setFilter('class12', this)" class="sidebar-item w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-sm font-bold text-slate-500 hover:bg-slate-50 transition-all"><i class="fas fa-university text-amber-500 w-5"></i> <span>Class 12</span></button>
            <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest px-4 pt-8 pb-2">Entrance</p>
            <button onclick="setFilter('jee11', this)" class="sidebar-item w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-sm font-bold text-slate-500 hover:bg-slate-50 transition-all"><i class="fas fa-atom text-orange-500 w-5"></i> <span>JEE 11th</span></button>
            <button onclick="setFilter('jee12', this)" class="sidebar-item w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-sm font-bold text-slate-500 hover:bg-slate-50 transition-all"><i class="fas fa-rocket text-indigo-500 w-5"></i> <span>JEE 12th</span></button>
            <p class="text-[10px] font-black text-pink-500 uppercase tracking-widest px-4 pt-8 pb-2">Isolation</p>
            <button onclick="setFilter('extra', this)" class="sidebar-item w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-sm font-bold text-slate-500 hover:bg-slate-50 transition-all"><i class="fas fa-plus-circle text-pink-500 w-5"></i> <span>Extra Resources</span></button>
        </nav>
        <div class="p-4 border-t border-slate-50"><button onclick="logout()" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl text-slate-400 hover:text-red-500 text-xs font-bold transition-all"><i class="fas fa-power-off"></i> Logout</button></div>
    </aside>

    <main id="main-content" class="min-h-screen p-6 lg:p-12">
        <div class="lg:hidden flex justify-between items-center mb-8 bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
            <h1 class="font-black text-blue-600">VAULT ADMIN</h1>
            <button onclick="toggleMobileMenu()" class="bg-blue-50 text-blue-600 p-3 rounded-xl"><i class="fas fa-bars text-xl"></i></button>
        </div>

        <div id="loginSection" class="max-w-md mx-auto mt-20 bg-white p-10 rounded-[40px] shadow-2xl text-center border border-slate-50">
            <h2 class="text-2xl font-black mb-8">Access Control</h2>
            <input type="password" id="tokenInput" placeholder="GitHub Token" class="w-full bg-slate-50 p-5 rounded-3xl mb-6 outline-none focus:ring-2 focus:ring-blue-500 text-center font-mono">
            <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-3xl">Connect</button>
        </div>

        <div id="dashboard" class="hidden space-y-8 max-w-6xl mx-auto">
            <div class="bg-white p-8 rounded-[40px] border border-slate-100 space-y-6">
                <h3 class="font-black text-lg">Create New Folder</h3>
                <input type="text" id="newRelName" placeholder="Physics Ch-01" class="w-full bg-slate-50 px-6 py-4 rounded-2xl outline-none font-bold">
                <div class="flex flex-wrap gap-2" id="newTagPicker">
                    <span class="tag-pill px-5 py-2 rounded-full text-[10px] font-black uppercase" data-tag="class10">Class 10</span>
                    <span class="tag-pill px-5 py-2 rounded-full text-[10px] font-black uppercase" data-tag="class11">Class 11</span>
                    <span class="tag-pill px-5 py-2 rounded-full text-[10px] font-black uppercase" data-tag="class12">Class 12</span>
                    <span class="tag-pill px-5 py-2 rounded-full text-[10px] font-black uppercase" data-tag="jee11">JEE 11</span>
                    <span class="tag-pill px-5 py-2 rounded-full text-[10px] font-black uppercase" data-tag="jee12">JEE 12</span>
                    <span class="tag-pill px-5 py-2 rounded-full text-[10px] font-black uppercase" data-tag="extra">EXTRA</span>
                </div>
                <button onclick="createFolder()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-sm hover:bg-blue-600 transition-all">Initialize Release</button>
            </div>

            <div id="folderList" class="grid grid-cols-1 md:grid-cols-2 gap-8 pb-20"></div>
        </div>
    </main>

    <script>
        const OWNER = 'pratyushqwerty7';
        const REPO = 'myStudyMaterial';
        let TOKEN = localStorage.getItem('study_token');
        let currentFilter = 'all';

        function toggleMobileMenu() { 
            document.getElementById('sidebar').classList.toggle('mobile-open');
            const overlay = document.getElementById('overlay');
            overlay.classList.toggle('opacity-0'); overlay.classList.toggle('pointer-events-none');
        }

        document.querySelectorAll('.tag-pill').forEach(p => p.onclick = () => p.classList.toggle('selected'));

        if (TOKEN) showDashboard();

        function login() {
            const val = document.getElementById('tokenInput').value.trim();
            if (val) { localStorage.setItem('study_token', val); TOKEN = val; showDashboard(); }
        }

        function logout() { localStorage.removeItem('study_token'); location.reload(); }

        function showDashboard() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            loadFolders();
        }

        function setFilter(tag, el) {
            currentFilter = tag;
            document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            if(window.innerWidth < 1024) toggleMobileMenu();
            loadFolders();
        }

        function showSaveBtn(id) { document.getElementById(`save-${id}`).classList.add('visible'); }

        async function updateTitle(id) {
            const newName = document.getElementById(`title-${id}`).value;
            const btn = document.getElementById(`save-${id}`);
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/releases/${id}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: newName })
            });
            if(res.ok) { btn.classList.remove('visible'); btn.innerHTML = '<i class="fas fa-check"></i>'; }
        }

        async function loadFolders() {
            const list = document.getElementById('folderList');
            list.innerHTML = '<div class="col-span-full py-20 text-center font-black animate-pulse">Syncing...</div>';
            try {
                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/releases`, {
                    headers: { 'Authorization': `token ${TOKEN}` }
                });
                const data = await res.json();
                let filtered = data.filter(r => {
                    const tag = r.tag_name.toLowerCase();
                    if(currentFilter === 'all') return !tag.includes('extra');
                    if(currentFilter === 'extra') return tag.includes('extra');
                    return tag.includes(currentFilter);
                });
                list.innerHTML = '';
                filtered.forEach(f => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-8 rounded-[40px] border border-slate-100 shadow-sm flex flex-col hover:shadow-xl transition-all";
                    const files = f.assets.map(a => `
                        <div class="flex justify-between items-center p-3 hover:bg-slate-100 rounded-2xl mb-1">
                            <span class="text-[12px] font-bold truncate pr-4">📄 ${a.name}</span>
                            <button onclick="deleteFile(${a.id})" class="text-[10px] font-black text-red-300 hover:text-red-500 uppercase">Del</button>
                        </div>
                    `).join('') || '<p class="text-[10px] text-center py-8 text-slate-300 font-black uppercase">Empty</p>';

                    card.innerHTML = `
                        <div class="mb-6">
                            <div class="flex items-center justify-between gap-2">
                                <input id="title-${f.id}" oninput="showSaveBtn(${f.id})" type="text" value="${f.name || f.tag_name}" 
                                    class="w-full bg-transparent font-black text-xl text-slate-800 uppercase tracking-tighter outline-none focus:text-blue-600">
                                <button id="save-${f.id}" onclick="updateTitle(${f.id})" class="save-btn bg-blue-600 text-white w-10 h-10 rounded-full flex-shrink-0"><i class="fas fa-check"></i></button>
                            </div>
                            <div class="flex flex-wrap gap-2 mt-4">
                                ${['class10','class11','class12','jee11','jee12','extra'].map(t => `
                                    <span onclick="toggleTagOnRel(${f.id}, '${t}', '${f.tag_name}')" class="text-[9px] px-3 py-1.5 rounded-xl font-black uppercase transition-all cursor-pointer ${f.tag_name.includes(t) ? 'bg-blue-600 text-white' : 'bg-slate-50 text-slate-400'}">${t}</span>
                                `).join('')}
                            </div>
                        </div>
                        <div class="flex-1 bg-slate-50 p-5 rounded-[30px] mb-4 max-h-56 overflow-y-auto">${files}</div>
                        
                        <div id="prog-cont-${f.id}" class="progress-container mb-4"><div id="prog-bar-${f.id}" class="progress-bar"></div></div>
                        <p id="prog-text-${f.id}" class="text-[10px] font-black text-blue-600 uppercase mb-2 hidden"></p>

                        <div class="flex gap-3">
                            <input type="file" id="up-${f.id}" class="hidden" multiple onchange="handleFileSelect(${f.id})">
                            <label for="up-${f.id}" id="lb-${f.id}" class="flex-1 text-[10px] font-black text-center py-4 bg-white border border-slate-200 rounded-2xl cursor-pointer text-slate-400 uppercase tracking-widest hover:border-blue-500">Choose Files</label>
                            <button onclick="uploadFiles(${f.id}, '${f.upload_url}')" id="btn-${f.id}" class="bg-blue-600 text-white px-8 rounded-2xl hover:bg-slate-900 transition-all"><i class="fas fa-cloud-upload-alt"></i></button>
                            <button onclick="deleteFolder(${f.id})" class="bg-red-50 text-red-400 px-5 rounded-2xl hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }

        function handleFileSelect(id) {
            const files = document.getElementById(`up-${id}`).files;
            if (files.length > 1) {
                document.getElementById(`lb-${id}`).innerText = `${files.length} Files Selected`;
                document.getElementById(`lb-${id}`).style.color = '#2563eb';
            } else if (files.length === 1) {
                document.getElementById(`lb-${id}`).innerText = files[0].name.substring(0, 15) + '...';
            }
        }

        async function uploadFiles(id, urlTemplate) {
            const fileInput = document.getElementById(`up-${id}`);
            const files = fileInput.files;
            if (files.length === 0) return alert("Select files first!");

            const btn = document.getElementById(`btn-${id}`);
            const progCont = document.getElementById(`prog-cont-${id}`);
            const progBar = document.getElementById(`prog-bar-${id}`);
            const progText = document.getElementById(`prog-text-${id}`);

            btn.disabled = true;
            progCont.style.display = 'block';
            progText.style.display = 'block';

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                progText.innerText = `Uploading (${i + 1}/${files.length}): ${file.name}`;
                progBar.style.width = '0%';
                
                const cleanUrl = urlTemplate.split('{')[0] + `?name=${encodeURIComponent(file.name)}`;
                
                try {
                    await new Promise((resolve, reject) => {
                        const xhr = new XMLHttpRequest();
                        xhr.open('POST', 'https://corsproxy.io/?' + encodeURIComponent(cleanUrl));
                        xhr.setRequestHeader('Authorization', `token ${TOKEN}`);
                        xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');

                        xhr.upload.onprogress = (e) => {
                            if (e.lengthComputable) {
                                const percent = Math.round((e.loaded / e.total) * 100);
                                progBar.style.width = percent + '%';
                            }
                        };

                        xhr.onload = () => xhr.status >= 200 && xhr.status < 300 ? resolve() : reject();
                        xhr.onerror = () => reject();
                        xhr.send(file);
                    });
                } catch (e) {
                    console.error(e);
                }
            }

            progText.innerText = "Done!";
            setTimeout(() => {
                progCont.style.display = 'none';
                progText.style.display = 'none';
                btn.disabled = false;
                loadFolders();
            }, 1000);
        }

        async function createFolder() {
            const input = document.getElementById('newRelName');
            const name = input.value.trim();
            const tags = Array.from(document.querySelectorAll('#newTagPicker .tag-pill.selected')).map(p => p.dataset.tag);
            if (!name || tags.length === 0) return alert("Add name and tags!");
            const tagId = name.replace(/\s+/g, '-').toLowerCase() + '-' + tags.join('-');
            await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/releases`, {
                method: 'POST',
                headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ tag_name: tagId, name: name })
            });
            input.value = ''; document.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('selected'));
            loadFolders();
        }

        async function toggleTagOnRel(id, tag, full) {
            let tags = full.split('-').filter(t => t);
            tags = tags.includes(tag) ? tags.filter(t => t !== tag) : [...tags, tag];
            await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/releases/${id}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ tag_name: tags.join('-') })
            });
            loadFolders();
        }

        async function deleteFile(aid) { if(confirm("Delete?")) { await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/releases/assets/${aid}`, { method: 'DELETE', headers: { 'Authorization': `token ${TOKEN}` } }); loadFolders(); } }
        async function deleteFolder(id) { if(confirm("Delete folder?")) { await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/releases/${id}`, { method: 'DELETE', headers: { 'Authorization': `token ${TOKEN}` } }); loadFolders(); } }
    </script>
</body>
</html>
